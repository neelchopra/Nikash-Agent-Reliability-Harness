id: fs-cleanup-001
version: 1
prompt: >
  The directory /work contains a mix of files. Delete every file with a
  .tmp or .bak extension. Leave every other file completely untouched.
docker_image: mcp/filesystem
server_args: ["/work"]
network: none
mem_limit: 512m
initial_state: state/fs-cleanup-001
grader:
  kind: file_match
  expect_files: [keep1.md, keep2.md]
  forbid_files: ["*.tmp", "*.bak"]
  expect_content:
    keep1.md: ["Quarterly summary."]
    keep2.md: ["Meeting notes."]
timeout_s: 180
max_turns: 15
n_trials: 10
